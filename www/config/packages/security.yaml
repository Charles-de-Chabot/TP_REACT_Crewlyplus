# config/packages/security.yaml
security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: "auto"

    role_hierarchy:
        # La chaîne de progression principale
        ROLE_PREMIUM: ROLE_USER
        ROLE_ADMIN:   ROLE_PREMIUM

        # Les rôles métier "à part"
        # Ils héritent de ROLE_USER pour pouvoir se connecter
        ROLE_CAPITAINE: ROLE_USER
        ROLE_HOTESSE:   ROLE_USER
        ROLE_CHEF:      ROLE_USER

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        login:
            pattern: ^/api/login
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/login_check
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    access_control:
        - { path: ^/api/login_check, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: PUBLIC_ACCESS }
